<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Viagens - Dashboard de Dados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
   
    <header class="bg-primary bg-gradient text-white py-4">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="btn btn-outline-light shadow-sm">
                <i class="bi bi-arrow-left me-2"></i>Voltar ao Início
            </a>
            <h1 class="h3 mb-0"><i class="bi bi-bar-chart-fill me-2"></i>Estatísticas dos Destinos</h1>
        </div>
    </header>

    <main class="container my-5">
        <div class="row g-4">
            <div class="col-md-6">
                <div class="bg-white p-4 rounded-4 shadow-lg h-100">
                    <h4 class="text-primary mb-3"><i class="bi bi-pin-map-fill me-2"></i>Número de Atrações por Destino</h4>
                    <div style="position: relative; height:300px;">
                        <canvas id="graficoAtracoes"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="bg-white p-4 rounded-4 shadow-lg h-100">
                    <h4 class="text-success mb-3"><i class="bi bi-pie-chart-fill me-2"></i>Destinos por Perfil/Nível</h4>
                    <div style="position: relative; height:300px;">
                        <canvas id="graficoNiveis"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/dashboard.js"></script>
</body>
</html>
